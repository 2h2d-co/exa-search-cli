[tools]
npm = "latest"
node = "24"

[env]
_.path = ["{{config_root}}/node_modules/.bin"]

[tasks.check]
description = "Typecheck and lint the CLI"
run = "npm run check"

[tasks.test]
description = "Run tests"
run = "npm test"

[tasks.fmt]
description = "Format with oxfmt"
run = "npm run fmt"

[tasks.lint]
description = "Lint with oxlint"
run = "npm run lint"

[tasks."pack:dry"]
description = "Validate the npm package contents without publishing"
run = "npm run pack:dry"

[tasks."publish:alpha"]
description = "Dry-run publishing exa-search-cli to npm with the alpha dist-tag. Pass --execute to publish."
usage = """
flag "--execute" help="Publish to npm for real instead of running npm publish --dry-run"
"""
run = """
npm run lint
npm run typecheck
npm test
npm run pack:dry

publish_mode="--dry-run"
if [ "${usage_execute:-false}" = "true" ]; then
  publish_mode=""
  echo "Publishing exa-search-cli to npm with dist-tag 'alpha'."
else
  echo "Running npm publish dry run for dist-tag 'alpha'. Pass --execute to publish for real."
fi

npm publish --tag alpha --allow-directory=all ${publish_mode}
"""

[tasks."publish:beta"]
description = "Dry-run publishing exa-search-cli to npm with the beta dist-tag. Pass --execute to publish."
usage = """
flag "--execute" help="Publish to npm for real instead of running npm publish --dry-run"
"""
run = """

[settings]
lockfile = true
locked = true
minimum_release_age = "7d"

[tools]
hk = { version = "1.48.0", postinstall = "hk install --mise" }
cocogitto = "7.0.0"
actionlint = "1.7.12"
zizmor = "1.26.1"
npm = "11"
node = "22"

[env]
_.path = ["{{config_root}}/node_modules/.bin"]

[shell_alias]
"exa-search:local" = "node {{config_root}}/src/cli.ts"
"exa:local" = "node {{config_root}}/src/cli.ts"
"search:local" = "node {{config_root}}/src/cli.ts"
